<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Mockup</title>
<link rel="stylesheet" href="styles.css">
<link rel="icon" href="favicon.svg">
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="logo">📊</div>
      <nav>
        <a href="index.html" class="active">Dashboard</a>
        <a href="analytics.html">Analytics</a>
        <a href="settings.html">Settings</a>
      </nav>
    </aside>
    <main>
      <header>
        <h1>Dashboard</h1>
        <p class="subtitle">Welcome back, here's your overview.</p>
      </header>

      <div class="cards">
        <div class="card">
          <span class="card-icon">📈</span>
          <div class="card-content">
            <h3>Revenue</h3>
            <p class="value">$12,430</p>
          </div>
        </div>
        <div class="card">
          <span class="card-icon">👤</span>
          <div class="card-content">
            <h3>Users</h3>
            <p class="value">1,284</p>
          </div>
        </div>
        <div class="card">
          <span class="card-icon">⚡</span>
          <div class="card-content">
            <h3>Active</h3>
            <p class="value">847</p>
          </div>
        </div>
      </div>

      <section class="chart">
        <h2>Weekly Activity</h2>
        <div class="chart-bars">
          <div class="bar" style="height: 60%"><span>Mon</span></div>
          <div class="bar" style="height: 85%"><span>Tue</span></div>
          <div class="bar" style="height: 45%"><span>Wed</span></div>
          <div class="bar" style="height: 90%"><span>Thu</span></div>
          <div class="bar" style="height: 70%"><span>Fri</span></div>
          <div class="bar" style="height: 50%"><span>Sat</span></div>
          <div class="bar" style="height: 30%"><span>Sun</span></div>
        </div>
      </section>
    </main>
  </div>
  <script src="app.js"></script>
</body>
</html>
